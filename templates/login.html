{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">

                    <i class="bi bi-box-arrow-in-right"></i>

                    Đăng nhập

                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label>Tên đăng nhập</label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Mật khẩu</label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-primary w-100">

                        Đăng nhập

                    </button>

                </form>

                <hr>

                <a href="/register">

                    Chưa có tài khoản?

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
