{% extends "base.html" %}

{% block content_container_class %}{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="col-11 col-sm-8 col-md-6 col-lg-5">

        <div class="card shadow-sm">

            <div class="card-body p-4 p-md-5">

                <h2 class="text-center mb-4">

                    <i class="bi bi-person-plus-fill text-primary"></i>

                    Đăng ký tài khoản

                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Tên đăng nhập

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Mật khẩu

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        <i class="bi bi-check-circle"></i>

                        Đăng ký

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    Đã có tài khoản?

                    <a href="/login">

                        Đăng nhập

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
