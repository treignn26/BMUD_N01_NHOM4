{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

```
<div class="col-md-6">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-center mb-4">

                <i class="bi bi-person-plus-fill"></i>

                Đăng ký tài khoản

            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        Tên đăng nhập

                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Mật khẩu

                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success w-100">

                    <i class="bi bi-check-circle"></i>

                    Đăng ký

                </button>

            </form>

            <hr>

            <div class="text-center">

                Đã có tài khoản?

                <a href="/login">

                    Đăng nhập

                </a>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
